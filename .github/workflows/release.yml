name: "Release"

on:
  release:
    types:
      - "published"

permissions: {}

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0

      - name: "Adjust version number"
        shell: "bash"
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          yq -i -o json '.version=strenv(TAG_NAME)' \
            "${{ github.workspace }}/custom_components/emeraldenergy/manifest.json"

      - name: "ZIP the integration directory"
        shell: "bash"
        run: |
          cd "${{ github.workspace }}/custom_components/emeraldenergy"
          zip emeraldenergy.zip -r ./

      - name: "Upload the ZIP file to the release"
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: ${{ github.workspace }}/custom_components/emeraldenergy/emeraldenergy.zip
