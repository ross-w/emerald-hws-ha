name: "Release"

on:
  release:
    types:
      - "published"

permissions: {}

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1" # v7.0.1

      - name: "Adjust version number"
        shell: "bash"
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          yq -i -o json '.version=strenv(TAG_NAME)' \
            "${{ github.workspace }}/custom_components/emeraldenergy/manifest.json"

      - name: "ZIP the integration directory"
        shell: "bash"
        run: |
          cd "${{ github.workspace }}/custom_components/emeraldenergy"
          zip emeraldenergy.zip -r ./

      - name: "Upload the ZIP file to the release"
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: ${{ github.workspace }}/custom_components/emeraldenergy/emeraldenergy.zip
